<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronto Studios | Apply</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    </style>
</head>
<body class="bg-black text-white min-h-screen">

    <nav class="bg-black/90 backdrop-blur-2xl border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-6">
            <a href="index.html" class="text-[#00b4ff] hover:underline">← Back to Careers</a>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-8 py-16">
        <h1 class="text-5xl font-bold heading-font tracking-tighter mb-2">Staff Application</h1>
        <p class="text-gray-400 mb-12">All applications are reviewed by leadership.</p>

        <form id="applicationForm" class="space-y-10">
            <div>
                <label class="block text-sm font-medium mb-2">Which position are you applying for?</label>
                <select id="position" class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-6 py-4 text-lg">
                    <option value="">Select Position</option>
                    <option value="Pronto Studios Content Creator">Content Creator</option>
                    <option value="Pronto Studios Editing Team">Editing Team</option>
                    <option value="Pronto Studios Shop Customer Service">Shop Customer Service</option>
                    <option value="Pronto Studios Staff Team">Staff Team</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Your Discord Username <span class="text-red-500">*</span></label>
                <input type="text" id="discord" required placeholder="username#0000 or @username" 
                       class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-6 py-4 text-lg">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Your TikTok / YouTube (if applying for Content Creator)</label>
                <input type="text" id="social" placeholder="https://tiktok.com/..." 
                       class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-6 py-4 text-lg">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Why do you want to join Pronto Studios?</label>
                <textarea id="why" rows="4" placeholder="Tell us about your motivation..." 
                          class="w-full bg-zinc-900 border border-white/20 rounded-3xl px-6 py-4"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Your application results will be sent via dms. Your applicaation can take up to 3 days to be reviewed. If you understand type "I understand"</label>
                <input type="text" id="portfolio" placeholder="Link to previous work" 
                       class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-6 py-4 text-lg">
            </div>

            <button type="submit" 
                    class="w-full py-6 bg-[#00b4ff] text-black font-semibold text-xl rounded-3xl hover:bg-white">
                Submit Application
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('applicationForm');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const position = document.getElementById('position').value;
            const discord = document.getElementById('discord').value.trim();
            const social = document.getElementById('social').value.trim();
            const why = document.getElementById('why').value.trim();
            const portfolio = document.getElementById('portfolio').value.trim();

            if (!discord) {
                alert("Please enter your Discord username.");
                return;
            }

            // Discord Webhook Embed
            const embed = {
                title: "New Staff Application",
                color: 0x00b4ff,
                fields: [
                    { name: "Position", value: position || "Not specified", inline: false },
                    { name: "Discord Username", value: discord, inline: true },
                    { name: "Social Link", value: social || "None provided", inline: true },
                    { name: "Why Join?", value: why || "No response", inline: false },
                    { name: "Portfolio", value: portfolio || "None provided", inline: false }
                ],
                timestamp: new Date().toISOString()
            };

            // Replace with your actual webhook URL
            const WEBHOOK_URL = "https://discordapp.com/api/webhooks/1492719269581164564/QcwcVyNYqdMIDOQMIgLDbxtCqEfnQL874QqgVWVX1jR_fevm1_zANJOtp5ujrsR_3Rgu";

            try {
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ embeds: [embed] })
                });
                alert("✅ Application submitted successfully! We will review it soon.");
                form.reset();
            } catch (error) {
                alert("✅ Application received (Discord notification may have failed).");
            }
        });
    </script>
</body>
</html>
