<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop - Pronto Studios</title>
<link rel="icon" href="logo.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:#020617;
color:white;
}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(15px);
z-index:1000;
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{width:40px;}

nav a{
margin-left:20px;
color:#aaa;
text-decoration:none;
cursor:pointer;
}

/* HERO */
.hero{
margin-top:120px;
text-align:center;
}

.hero h1{
font-size:50px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
-webkit-background-clip:text;
color:transparent;
}

/* PRODUCTS */
.grid{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
overflow:hidden;
backdrop-filter:blur(10px);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 30px #7a5cff;
}

.card img{width:100%;}

.card-body{padding:20px;}

.price{
color:#00d4ff;
margin:10px 0;
font-weight:bold;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
}

/* 🔥 POPUP */
#buyPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(12px);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:linear-gradient(145deg,#0d1025,#05070f);
padding:35px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 0 50px rgba(122,92,255,0.4);
animation:pop 0.4s ease;
}

.popup-box h2{
margin-bottom:10px;
}

.popup-box input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
outline:none;
}

.popup-box button{
margin-top:15px;
}

@keyframes pop{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
<h3>Pronto Studios</h3>
</div>

<nav>
<a href="index.html">Home</a>
</nav>
</header>

<div class="hero">
<h1>Shop</h1>
</div>

<div class="grid">

<!-- PRODUCTS -->
<script>
const products = [
["Turf Showcases",4.5],
["Gang Movie Trailer",10],
["Custom Film",7.5],
["Gang Pics",1.5],
["Gang Edits",5],
["Custom Edits",4],
["Advertisement",2]
];

document.write(products.map(p=>`
<div class="card">
<img src="product.png">
<div class="card-body">
<h3>${p[0]}</h3>
<div class="price">$${p[1]}</div>
<button onclick="openPopup('${p[0]}',${p[1]})">Buy</button>
</div>
</div>
`).join(""));
</script>

</div>

<!-- 🔥 POPUP -->
<div id="buyPopup">
<div class="popup-box">
<h2>Enter Discord</h2>
<p style="font-size:13px;color:#aaa;">We’ll contact you for your order</p>
<input id="discordInput" placeholder="username#0000">
<button onclick="confirmBuy()">Continue</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>
let selectedItem="";
let selectedPrice=0;

function openPopup(item,price){
selectedItem=item;
selectedPrice=price;
document.getElementById("buyPopup").style.display="flex";
}

function closePopup(){
document.getElementById("buyPopup").style.display="none";
}

function confirmBuy(){
let user=document.getElementById("discordInput").value;

if(!user){
alert("Enter Discord username");
return;
}

/* 🔥 DISCORD WEBHOOK */
fetch("YOUR_WEBHOOK_URL",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`🛒 NEW ORDER\nUser: ${user}\nItem: ${selectedItem}\nPrice: $${selectedPrice}`
})
});

/* 💸 PAYPAL */
window.open("https://paypal.me/YOUR_PAYPAL_USERNAME/"+selectedPrice,"_blank");

closePopup();
}
</script>

</body>
</html>
