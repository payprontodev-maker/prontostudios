<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop - Pronto Studios</title>
<link rel="icon" href="logo.png">

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

/* HEADER */
header{
background:#111827;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

header img{
width:40px;
vertical-align:middle;
}

header a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* GRID */
.grid{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#1f2937;
padding:20px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#38bdf8;
margin:10px 0;
}

/* BUTTON */
button{
background:#3b82f6;
border:none;
padding:10px;
color:white;
border-radius:5px;
cursor:pointer;
width:100%;
}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#1f2937;
padding:20px;
border-radius:10px;
text-align:center;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<header>
<div>
<img src="logo.png">
<strong>Pronto Studios</strong>
</div>
<div>
<a href="index.html">Home</a>
</div>
</header>

<div class="grid">

<div class="card">
<img src="product.png">
<h3>Turf Showcases</h3>
<div class="price">$4.50</div>
<button onclick="openPopup('Turf Showcases',4.5)">Purchase</button>
</div>

<div class="card">
<img src="product.png">
<h3>Gang Movie Trailer</h3>
<div class="price">$10</div>
<button onclick="openPopup('Gang Movie Trailer',10)">Purchase</button>
</div>

<div class="card">
<img src="product.png">
<h3>Custom Film</h3>
<div class="price">$7.50</div>
<button onclick="openPopup('Custom Film',7.5)">Purchase</button>
</div>

<div class="card">
<img src="product.png">
<h3>Gang Pics</h3>
<div class="price">$1.50</div>
<button onclick="openPopup('Gang Pics',1.5)">Purchase</button>
</div>

<div class="card">
<img src="product.png">
<h3>Gang Edits</h3>
<div class="price">$5</div>
<button onclick="openPopup('Gang Edits',5)">Purchase</button>
</div>

<div class="card">
<img src="product.png">
<h3>Custom Edits</h3>
<div class="price">$4</div>
<button onclick="openPopup('Custom Edits',4)">Purchase</button>
</div>

<div class="card">
<img src="product.png">
<h3>Advertisement</h3>
<div class="price">$2</div>
<button onclick="openPopup('Advertisement',2)">Purchase</button>
</div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2>Enter Discord</h2>
<input id="discord" placeholder="username#0000">

<button onclick="buy()">Continue</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>
let item="",price=0;

function openPopup(i,p){
item=i;
price=p;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function buy(){
let user=document.getElementById("discord").value;

if(!user){
alert("Enter Discord username");
return;
}

/* WEBHOOK */
fetch("YOUR_WEBHOOK_URL",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`🛒 ORDER\nUser: ${user}\nItem: ${item}\nPrice: $${price}`
})
});

/* PAYPAL */
window.open("https://paypal.me/YOUR_PAYPAL_USERNAME/"+price,"_blank");

closePopup();
}
</script>

</body>
</html>
