<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop - Pronto</title>
<link rel="icon" href="logo.png">

<style>
body{
margin:0;
font-family:Arial;
background:#030712;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

header img{width:40px;}

.grid{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
text-align:center;
}

.card img{width:100%;border-radius:10px;}

.price{color:#00d4ff;margin:10px;}

button{
padding:10px;
border:none;
background:#7a5cff;
color:white;
border-radius:5px;
cursor:pointer;
width:100%;
}
</style>
</head>

<body>

<header>
<div>
<img src="logo.png">
</div>
<a href="index.html">Home</a>
</header>

<div class="grid">

<div class="card">
<img src="product.png">
<h3>Turf Showcases</h3>
<div class="price">$4.50</div>
<button onclick="buy('Turf Showcases',4.5)">Buy</button>
</div>

<div class="card">
<img src="product.png">
<h3>Gang Movie Trailer</h3>
<div class="price">$10</div>
<button onclick="buy('Gang Movie Trailer',10)">Buy</button>
</div>

</div>

<script>
function buy(item,price){
let user=localStorage.getItem("discord");

if(!user){
alert("Reload and enter Discord first");
return;
}

/* WEBHOOK */
fetch("YOUR_WEBHOOK_URL",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`User: ${user}\nItem: ${item}\nPrice: $${price}`
})
});

/* PAYPAL */
window.open("https://paypal.me/YOUR_PAYPAL_USERNAME/"+price,"_blank");
}
</script>

</body>
</html>
