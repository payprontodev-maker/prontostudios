<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronto Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body {
  background: radial-gradient(circle at top, #0a1228, #020611);
  color: white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background: rgba(0,0,0,0.4);
}

.logo {display:flex;align-items:center;gap:10px;}
.logo img {width:35px;}
nav a {margin-left:20px;color:#aaa;text-decoration:none;}
nav a:hover {color:#6c8cff;}

/* HERO */
.hero {text-align:center;padding:50px 20px;}
.hero h1 {font-size:40px;}

/* SHOP */
.shop {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:40px;
}

.card {
  background: rgba(255,255,255,0.03);
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 20px rgba(100,140,255,0.3);
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.price {color:#6c8cff;margin:10px 0;}

.buy-btn {
  background:#6c8cff;
  padding:8px 15px;
  border-radius:15px;
  cursor:pointer;
  border:none;
  color:white;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:#111;
  padding:25px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

.modal input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
}

.status {
  margin-top:10px;
  font-size:14px;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <span>Pronto Studios</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </nav>
</header>

<section class="hero">
  <h1>Shop Services</h1>
</section>

<section class="shop">

<div class="card">
  <img src="product.png">
  <div class="card-content">
    <h3>Turf Showcase</h3>
    <div class="price">$4.50</div>
    <button class="buy-btn" onclick="openModal('Turf Showcase', 4.5)">Buy</button>
  </div>
</div>

<div class="card">
  <img src="product.png">
  <div class="card-content">
    <h3>Gang Movie Trailer</h3>
    <div class="price">$10</div>
    <button class="buy-btn" onclick="openModal('Gang Movie Trailer', 10)">Buy</button>
  </div>
</div>

<div class="card">
  <img src="product.png">
  <div class="card-content">
    <h3>Custom Film</h3>
    <div class="price">$7.50</div>
    <button class="buy-btn" onclick="openModal('Custom Film', 7.5)">Buy</button>
  </div>
</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="serviceName"></h3>

    <input type="text" id="username" placeholder="Enter Discord Username">

    <button class="buy-btn" onclick="purchase()">Proceed</button>

    <div class="status" id="statusText"></div>
  </div>
</div>

<script>

const WEBHOOK_URL = "https://discord.com/api/webhooks/1490854953772650567/_p1b0BaWHgkefgow0IYrRBgU_ONaUO_Hunt9yQy7HSJcI7BB1bJUBf_-xKpeqPFn8EhF";
const PAYPAL_LINK = "https://www.paypal.com/paypalme/StephanMerdanes";

let currentService = "";
let currentPrice = 0;

function openModal(service, price){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("serviceName").innerText = service;
  currentService = service;
  currentPrice = price;
}

function purchase(){
  const user = document.getElementById("username").value;

  if(!user){
    alert("Enter Discord username");
    return;
  }

  document.getElementById("statusText").innerText = "Pending Payment...";

  // Send webhook
  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      content: `🛒 New Order\nUser: ${user}\nService: ${currentService}\nPrice: $${currentPrice}\nStatus: Pending`
    })
  });

  // Redirect to PayPal
  window.open(PAYPAL_LINK, "_blank");

  document.getElementById("statusText").innerText = "Waiting for payment...";

  // Fake completion (you can manually confirm later)
  setTimeout(()=>{
    document.getElementById("statusText").innerText = "Completed (after confirmation)";
  }, 5000);
}

</script>

</body>
</html>
