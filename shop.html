<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop - Pronto Studios</title>
<link rel="icon" href="logo.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* SPARKLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* GLOW */
.bg-glow{
position:fixed;
width:900px;
height:900px;
background:#7a5cff;
filter:blur(200px);
opacity:0.25;
top:-300px;
left:-300px;
animation:moveGlow 18s infinite alternate;
z-index:-1;
}

@keyframes moveGlow{
100%{transform:translate(350px,350px);}
}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:center;
z-index:1000;
}

.nav{
margin-top:15px;
width:90%;
max-width:1200px;
display:flex;
justify-content:space-between;
padding:15px 30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(122,92,255,0.3);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
}

/* GRID */
.grid{
padding:150px 50px 50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:40px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:25px;
overflow:hidden;
transition:0.4s;
position:relative;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:25px;
text-align:center;
}

.card h3{
margin-bottom:10px;
}

.price{
color:#00d4ff;
margin-bottom:15px;
}

/* BADGE */
.badge{
position:absolute;
top:15px;
left:15px;
background:linear-gradient(90deg,#ff0080,#ff8c00);
padding:5px 12px;
border-radius:20px;
font-size:12px;
}

/* HOVER */
.card:hover{
transform:translateY(-15px) scale(1.04);
box-shadow:0 0 50px rgba(122,92,255,0.6);
}

/* BUTTON */
.btn{
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
width:100%;
}

/* POPUP */
#popup{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
backdrop-filter:blur(10px);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
width:340px;
text-align:center;
}

.popup-box input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:10px;
border:none;
}

.popup-box button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#7a5cff;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="sparkles"></canvas>
<div class="bg-glow"></div>

<header>
<div class="nav">
<div class="logo">
<img src="logo.png">
<h3>Pronto Studios</h3>
</div>
<a href="index.html">Home</a>
</div>
</header>

<div class="grid">

<div class="card">
<div class="badge">Most Popular</div>
<img src="product.png">
<div class="card-body">
<h3>Turf Showcases</h3>
<div class="price">$4.5</div>
<button class="btn" onclick="openPopup('Turf Showcases',4.5)">Purchase</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-body">
<h3>Gang Movie Trailer</h3>
<div class="price">$10</div>
<button class="btn" onclick="openPopup('Gang Movie Trailer',10)">Purchase</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-body">
<h3>Custom Film</h3>
<div class="price">$7.5</div>
<button class="btn" onclick="openPopup('Custom Film',7.5)">Purchase</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-body">
<h3>Gang Pics</h3>
<div class="price">$1.5</div>
<button class="btn" onclick="openPopup('Gang Pics',1.5)">Purchase</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-body">
<h3>Gang Edits</h3>
<div class="price">$5</div>
<button class="btn" onclick="openPopup('Gang Edits',5)">Purchase</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-body">
<h3>Custom Edits</h3>
<div class="price">$4</div>
<button class="btn" onclick="openPopup('Custom Edits',4)">Purchase</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-body">
<h3>Advertisement</h3>
<div class="price">$2</div>
<button class="btn" onclick="openPopup('Advertisement',2)">Purchase</button>
</div>
</div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2>Enter Discord</h2>
<input id="discord" placeholder="username#0000">
<button onclick="buy()">Continue to Payment</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>
let item="",price=0;

function openPopup(i,p){
item=i;
price=p;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function buy(){
let user=document.getElementById("discord").value;

if(!user){
alert("Enter Discord username");
return;
}

/* DISCORD WEBHOOK */
fetch("YOUR_WEBHOOK_URL",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`🛒 ORDER\nUser: ${user}\nItem: ${item}\nPrice: $${price}`
})
});

/* PAYPAL */
window.open("https://paypal.me/YOUR_PAYPAL_USERNAME/"+price,"_blank");

closePopup();
}

/* SPARKLES */
const canvas=document.getElementById("sparkles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
s:Math.random()*0.6
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

s.y-=s.s;
if(s.y<0){
s.y=canvas.height;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
