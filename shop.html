<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronto Studios | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root { --accent: #00b4ff; }
        
        .product-card {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .product-card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px -15px rgba(0, 180, 255, 0.3);
        }
        
        .price-tag {
            background: linear-gradient(90deg, #00b4ff, #7b5cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-['Inter']">

    <!-- NAVBAR (same as your current one) -->
    <nav class="bg-black/90 backdrop-blur-xl border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-6 flex items-center justify-between">
            <img src="logo.png" alt="Pronto Studios" class="h-11 w-auto">
            <div class="hidden md:flex items-center gap-10 text-lg font-medium">
                <a href="index.html" class="hover:text-[#00b4ff]">Home</a>
                <a href="shop.html" class="text-[#00b4ff] font-semibold">Shop</a>
                <a href="terms.html" class="hover:text-[#00b4ff]">Terms</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="https://discord.gg/yourserver" target="_blank" class="px-7 py-3 bg-white/10 hover:bg-white/15 rounded-2xl flex items-center gap-2">
                    <i class="fab fa-discord"></i> Discord
                </a>
                <a href="index.html" class="px-8 py-3 bg-white/10 hover:bg-white/20 rounded-2xl">← Home</a>
            </div>
        </div>
    </nav>

    <!-- SHOP CONTENT (same clean grid) -->
    <div class="max-w-screen-2xl mx-auto px-6 pt-16 pb-12">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-bold tracking-tighter mb-4" style="font-family: 'Space Grotesk', sans-serif;">Shop Services</h1>
            <p class="text-xl text-gray-400">Pay with PayPal • Orders logged automatically in Discord</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
            
            <!-- Example: Turf Showcases -->
            <div class="product-card rounded-3xl p-8">
                <div class="text-4xl mb-6">🎥</div>
                <h3 class="text-3xl font-semibold mb-2">Turf Showcases</h3>
                <p class="text-gray-400 mb-8">Clean cinematic showcase of your turf.</p>
                <div class="flex justify-between items-end">
                    <div class="price-tag text-5xl font-bold">$4.50</div>
                    <button onclick="purchaseService('Turf Showcases', 4.50)" 
                            class="px-8 py-4 bg-[#00b4ff] text-black font-semibold rounded-2xl hover:bg-[#0099ff]">
                        Buy with PayPal
                    </button>
                </div>
            </div>

            <!-- Repeat the same structure for other services below -->
            <!-- Gang Movie Trailer -->
            <div class="product-card rounded-3xl p-8">
                <div class="text-4xl mb-6">🎬</div>
                <h3 class="text-3xl font-semibold mb-2">Gang Movie Trailer</h3>
                <p class="text-gray-400 mb-8">Epic cinematic trailer for your gang.</p>
                <div class="flex justify-between items-end">
                    <div class="price-tag text-5xl font-bold">$10</div>
                    <button onclick="purchaseService('Gang Movie Trailer', 10)" 
                            class="px-8 py-4 bg-[#00b4ff] text-black font-semibold rounded-2xl hover:bg-[#0099ff]">
                        Buy with PayPal
                    </button>
                </div>
            </div>

            <!-- Add the rest of your services (Custom Film, Gang Pics, Gang Edits, Custom Edits, Advertisement) the same way -->

        </div>
    </div>

    <script>
        // ================== CONFIGURATION ==================
        const PAYPAL_EMAIL = "https://www.paypal.com/paypalme/StephanMerdanes";   // ← CHANGE THIS
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1490854953772650567/_p1b0BaWHgkefgow0IYrRBgU_ONaUO_Hunt9yQy7HSJcI7BB1bJUBf_-xKpeqPFn8EhF"; // ← CHANGE THIS

        async function purchaseService(serviceName, price) {
            const buyerName = prompt("Enter your Discord username (so I know who ordered):") || "Anonymous Buyer";
            
            // 1. Send to Discord Webhook (beautiful embed)
            const embed = {
                title: "🛒 New Order Received!",
                color: 0x00b4ff,
                fields: [
                    { name: "Service", value: serviceName, inline: true },
                    { name: "Price", value: `$${price}`, inline: true },
                    { name: "Buyer", value: buyerName, inline: true },
                    { name: "Time", value: new Date().toLocaleString(), inline: false }
                ],
                footer: { text: "Pronto Studios • Street Wars 2" }
            };

            try {
                await fetch(DISCORD_WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: "Pronto Orders",
                        embeds: [embed]
                    })
                });
                console.log("✅ Order logged to Discord");
            } catch (e) {
                console.error("Webhook failed", e);
            }

            // 2. Open PayPal checkout
            const paypalUrl = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${encodeURIComponent(PAYPAL_EMAIL)}&item_name=${encodeURIComponent(serviceName)}&amount=${price}&currency_code=USD&return=https://yourdomain.com/success.html`;
            
            window.location.href = paypalUrl;
        }
    </script>
</body>
</html>
