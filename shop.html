<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pronto Shop</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0f2c, #02030a);
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 40px;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

/* TITLE */
.hero {
    text-align: center;
    padding: 50px 20px;
}

.hero h1 {
    font-size: 50px;
    background: linear-gradient(90deg, #7a5cff, #00d4ff);
    -webkit-background-clip: text;
    color: transparent;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

.card-content {
    padding: 20px;
}

.price {
    color: #00ffcc;
    font-size: 18px;
}

.buy-btn {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #7a5cff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
}

.buy-btn:hover {
    background: #5a3cff;
}

/* POPUP */
.popup {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
}

.popup-box {
    background: #111;
    padding: 25px;
    border-radius: 10px;
    width: 300px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
}

.confirm-btn {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: #00d4ff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png">
        <h2>Pronto</h2>
    </div>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<div class="hero">
    <h1>Pronto Shop</h1>
    <p>Select a service and purchase instantly</p>
</div>

<div class="products">

<!-- PRODUCT -->
<div class="card">
    <img src="product.png">
    <div class="card-content">
        <h3>Turf Showcase</h3>
        <p class="price">$4.50</p>
        <button class="buy-btn" onclick="buy('Turf Showcase', 4.5)">Buy</button>
    </div>
</div>

<div class="card">
    <img src="product.png">
    <div class="card-content">
        <h3>Gang Movie Trailer</h3>
        <p class="price">$10</p>
        <button class="buy-btn" onclick="buy('Gang Movie Trailer', 10)">Buy</button>
    </div>
</div>

<div class="card">
    <img src="product.png">
    <div class="card-content">
        <h3>Custom Film</h3>
        <p class="price">$7.50</p>
        <button class="buy-btn" onclick="buy('Custom Film', 7.5)">Buy</button>
    </div>
</div>

<div class="card">
    <img src="product.png">
    <div class="card-content">
        <h3>Gang Pics</h3>
        <p class="price">$1.50</p>
        <button class="buy-btn" onclick="buy('Gang Pics', 1.5)">Buy</button>
    </div>
</div>

<div class="card">
    <img src="product.png">
    <div class="card-content">
        <h3>Gang Edits</h3>
        <p class="price">$5</p>
        <button class="buy-btn" onclick="buy('Gang Edits', 5)">Buy</button>
    </div>
</div>

<div class="card">
    <img src="product.png">
    <div class="card-content">
        <h3>Custom Edits</h3>
        <p class="price">$4</p>
        <button class="buy-btn" onclick="buy('Custom Edits', 4)">Buy</button>
    </div>
</div>

<div class="card">
    <img src="product.png">
    <div class="card-content">
        <h3>Advertisement</h3>
        <p class="price">$2</p>
        <button class="buy-btn" onclick="buy('Advertisement', 2)">Buy</button>
    </div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>Enter Discord Username</h3>
        <input type="text" id="discordUser" placeholder="username#0000">
        <button class="confirm-btn" onclick="confirmPurchase()">Continue to PayPal</button>
    </div>
</div>

<script>
let selectedProduct = "";
let selectedPrice = 0;

function buy(product, price) {
    selectedProduct = product;
    selectedPrice = price;
    document.getElementById("popup").style.display = "flex";
}

function confirmPurchase() {
    let user = document.getElementById("discordUser").value;

    if(user === "") {
        alert("Enter Discord username");
        return;
    }

    // 🔥 DISCORD WEBHOOK
    fetch("https://discord.com/api/webhooks/1490854953772650567/_p1b0BaWHgkefgow0IYrRBgU_ONaUO_Hunt9yQy7HSJcI7BB1bJUBf_-xKpeqPFn8EhF", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            content: "**NEW ORDER**\nUser: " + user + "\nProduct: " + selectedProduct + "\nPrice: $" + selectedPrice
        })
    });

    // ✅ PAYPAL LINK
    window.open("https://www.paypal.com/paypalme/StephanMerdanes/" + selectedPrice, "_blank");

    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
