<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pronto Shop</title>
<link rel="icon" href="logo.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(120deg,#020617,#0f172a);
color:white;
}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{width:40px;}

nav a{
margin-left:20px;
color:#aaa;
text-decoration:none;
}

/* HERO */
.hero{
padding-top:120px;
text-align:center;
}

.hero h1{
font-size:55px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
-webkit-background-clip:text;
color:transparent;
}

/* GRID */
.grid{
padding:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:25px;
overflow:hidden;
backdrop-filter:blur(20px);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 30px rgba(122,92,255,0.4);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:20px;
}

.price{
color:#00d4ff;
margin:10px 0;
}

/* BUTTON */
.buy-btn{
width:100%;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#0f172a;
padding:30px;
border-radius:20px;
width:300px;
text-align:center;
}

.popup-box input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
}

.popup-box button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#7a5cff;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
<h3>Pronto Studios</h3>
</div>

<nav>
<a href="index.html">Home</a>
</nav>
</header>

<div class="hero">
<h1>Shop</h1>
</div>

<div class="grid" id="grid"></div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2>Enter Discord</h2>
<input id="discord" placeholder="username#0000">
<button onclick="buy()">Continue</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>
const products = [
["Turf Showcases",4.5],
["Gang Movie Trailer",10],
["Custom Film",7.5],
["Gang Pics",1.5],
["Gang Edits",5],
["Custom Edits",4],
["Advertisement",2]
];

const grid = document.getElementById("grid");

products.forEach(p=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="product.png">
<div class="card-body">
<h3>${p[0]}</h3>
<div class="price">$${p[1]}</div>
<button class="buy-btn">Purchase</button>
</div>
`;

card.querySelector("button").onclick=()=>{
openPopup(p[0],p[1]);
};

grid.appendChild(card);
});

let item="";
let price=0;

function openPopup(i,p){
item=i;
price=p;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function buy(){
let user=document.getElementById("discord").value;

if(!user){
alert("Enter Discord username");
return;
}

/* DISCORD WEBHOOK */
fetch("YOUR_WEBHOOK_URL",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`🛒 ORDER\nUser: ${user}\nItem: ${item}\nPrice: $${price}`
})
});

/* PAYPAL */
window.open("https://paypal.me/YOUR_PAYPAL_USERNAME/"+price,"_blank");

closePopup();
}
</script>

</body>
</html>
