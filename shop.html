<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop - Pronto Studios</title>
<link rel="icon" href="logo.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* SPARKLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* GLOW */
.bg-glow{
position:fixed;
width:700px;
height:700px;
background:#7a5cff;
filter:blur(160px);
opacity:0.2;
top:-200px;
left:-200px;
animation:moveGlow 12s infinite alternate;
z-index:-1;
}

@keyframes moveGlow{
100%{transform:translate(250px,250px);}
}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:center;
z-index:1000;
}

.nav{
margin-top:15px;
width:90%;
max-width:1200px;
display:flex;
justify-content:space-between;
padding:15px 30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 0 30px rgba(122,92,255,0.2);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
}

/* GRID */
.grid{
padding:140px 50px 50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:25px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 30px rgba(122,92,255,0.5);
}

.card h3{margin-bottom:10px;}

.price{
color:#00d4ff;
margin-bottom:15px;
font-size:18px;
}

/* BUTTON */
.btn{
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
width:100%;
}

/* POPUP */
#popup{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#0f172a;
padding:30px;
border-radius:20px;
width:300px;
text-align:center;
}

.popup-box input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

.popup-box button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#7a5cff;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="sparkles"></canvas>
<div class="bg-glow"></div>

<header>
<div class="nav">
<div class="logo">
<img src="logo.png">
<h3>Pronto Studios</h3>
</div>
<a href="index.html">Home</a>
</div>
</header>

<div class="grid" id="grid"></div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2>Enter Discord</h2>
<input id="discord" placeholder="username#0000">
<button onclick="buy()">Continue</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>
const products=[
["Turf Showcases",4.5],
["Gang Movie Trailer",10],
["Custom Film",7.5],
["Gang Pics",1.5],
["Gang Edits",5],
["Custom Edits",4],
["Advertisement",2]
];

const grid=document.getElementById("grid");

products.forEach(p=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${p[0]}</h3>
<div class="price">$${p[1]}</div>
<button class="btn">Purchase</button>
`;

card.querySelector("button").onclick=()=>{
openPopup(p[0],p[1]);
};

grid.appendChild(card);
});

let item="",price=0;

function openPopup(i,p){
item=i;
price=p;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function buy(){
let user=document.getElementById("discord").value;

if(!user){
alert("Enter Discord username");
return;
}

/* WEBHOOK */
fetch("https://discord.com/api/webhooks/1490854953772650567/_p1b0BaWHgkefgow0IYrRBgU_ONaUO_Hunt9yQy7HSJcI7BB1bJUBf_-xKpeqPFn8EhF",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`🛒 ORDER\nUser: ${user}\nItem: ${item}\nPrice: $${price}`
})
});

/* PAYPAL */
window.open("https://www.paypal.com/paypalme/StephanMerdanes/"+price,"_blank");

closePopup();
}

/* SPARKLES */
const canvas=document.getElementById("sparkles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<80;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
s:Math.random()*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

s.y-=s.s;
if(s.y<0){
s.y=canvas.height;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
