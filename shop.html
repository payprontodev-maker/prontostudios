<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop - Pronto Studios</title>
<link rel="icon" href="logo.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.bg-glow{
position:fixed;
width:800px;
height:800px;
background:#7a5cff;
filter:blur(180px);
opacity:0.2;
top:-300px;
left:-300px;
animation:moveGlow 15s infinite alternate;
z-index:-1;
}

@keyframes moveGlow{
100%{transform:translate(300px,300px);}
}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:center;
z-index:1000;
}

.nav{
margin-top:15px;
width:90%;
max-width:1200px;
display:flex;
justify-content:space-between;
padding:15px 30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(122,92,255,0.3);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
}

/* GRID */
.grid{
padding:140px 50px 50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:25px;
padding:30px;
text-align:center;
transition:0.35s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#7a5cff33,transparent);
top:-50%;
left:-50%;
opacity:0;
transition:0.5s;
}

.card:hover::before{
opacity:1;
}

.card:hover{
transform:translateY(-12px) scale(1.04);
box-shadow:0 0 40px rgba(122,92,255,0.6);
}

.card h3{
margin-bottom:10px;
font-size:20px;
}

.price{
color:#00d4ff;
font-size:18px;
margin-bottom:20px;
}

/* BUTTON */
.btn{
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
width:100%;
font-size:15px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 25px #7a5cff;
}

/* POPUP */
#popup{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
backdrop-filter:blur(10px);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:rgba(255,255,255,0.05);
padding:35px;
border-radius:20px;
width:320px;
text-align:center;
animation:fadeUp 0.4s ease;
}

.popup-box h2{
margin-bottom:10px;
}

.popup-box input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

.popup-box button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#7a5cff;
color:white;
cursor:pointer;
transition:0.2s;
}

.popup-box button:hover{
background:#6a4be0;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;}
}

/* MOBILE */
@media(max-width:768px){
.grid{padding:120px 20px;}
}
</style>
</head>

<body>

<canvas id="sparkles"></canvas>
<div class="bg-glow"></div>

<header>
<div class="nav">
<div class="logo">
<img src="logo.png">
<h3>Pronto Studios</h3>
</div>
<a href="index.html">Home</a>
</div>
</header>

<div class="grid" id="grid"></div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2>Enter Discord</h2>
<p style="color:#aaa;font-size:14px;">We’ll contact you about your order</p>
<input id="discord" placeholder="username#0000">
<button onclick="buy()">Continue to Payment</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>
window.addEventListener("DOMContentLoaded",()=>{

const products=[
["Turf Showcases",4.5],
["Gang Movie Trailer",10],
["Custom Film",7.5],
["Gang Pics",1.5],
["Gang Edits",5],
["Custom Edits",4],
["Advertisement",2]
];

const grid=document.getElementById("grid");

products.forEach(p=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${p[0]}</h3>
<div class="price">$${p[1]}</div>
<button class="btn">Purchase</button>
`;

let btn=card.querySelector(".btn");

btn.addEventListener("click",()=>{
openPopup(p[0],p[1]);
});

grid.appendChild(card);
});

});

/* POPUP */
let item="",price=0;

function openPopup(i,p){
item=i;
price=p;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* BUY */
function buy(){
let user=document.getElementById("discord").value;

if(!user){
alert("Enter Discord username");
return;
}

/* WEBHOOK */
fetch("https://discord.com/api/webhooks/1490854953772650567/_p1b0BaWHgkefgow0IYrRBgU_ONaUO_Hunt9yQy7HSJcI7BB1bJUBf_-xKpeqPFn8EhF",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`🛒 ORDER\nUser: ${user}\nItem: ${item}\nPrice: $${price}`
})
});

/* PAYPAL */
window.open("https://www.paypal.com/paypalme/StephanMerdanes/"+price,"_blank");

closePopup();
}

/* SPARKLES */
const canvas=document.getElementById("sparkles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
s:Math.random()*0.6
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

s.y-=s.s;
if(s.y<0){
s.y=canvas.height;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
