<style>
body {
  margin:0;
  font-family:-apple-system,Arial;
  background:#0a0f1c;
  color:white;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

.title {
  text-align:center;
  margin:50px 0;
  font-size:32px;
}

.grid {
  max-width:800px;
  margin:auto;
  display:grid;
  gap:15px;
}

.item {
  display:flex;
  justify-content:space-between;
  padding:18px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  transition:.3s;
}

.item:hover {
  transform:translateY(-4px);
  box-shadow:0 0 20px rgba(58,123,255,0.3);
}
</style>
