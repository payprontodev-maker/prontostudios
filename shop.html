<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background: radial-gradient(circle at top,#0a1228,#020611);
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{width:35px;}

nav a{
  margin-left:15px;
  color:#aaa;
  text-decoration:none;
}

/* SHOP GRID */
.shop{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px rgba(100,140,255,0.3);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.price{
  color:#6c8cff;
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,#6c8cff,#7c3aed);
  color:white;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  background:#111827;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

.box input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <span>Pronto Studios</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </nav>
</header>

<section class="shop">

<!-- PRODUCTS -->

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Turf Showcases</h3>
<div class="price">$4.50</div>
<button onclick="buy('Turf Showcases',4.5)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Gang Movie Trailer</h3>
<div class="price">$10</div>
<button onclick="buy('Gang Movie Trailer',10)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Custom Film</h3>
<div class="price">$7.50</div>
<button onclick="buy('Custom Film',7.5)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Gang Pics</h3>
<div class="price">$1.50</div>
<button onclick="buy('Gang Pics',1.5)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Gang Edits</h3>
<div class="price">$5</div>
<button onclick="buy('Gang Edits',5)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Custom Edits</h3>
<div class="price">$4</div>
<button onclick="buy('Custom Edits',4)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Advertisement</h3>
<div class="price">$2</div>
<button onclick="buy('Advertisement',2)">Buy</button>
</div>
</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3 id="itemName"></h3>
    <input id="discord" placeholder="Discord Username">
    <br><br>
    <button onclick="confirmPurchase()">Confirm</button>
  </div>
</div>

<script>

const WEBHOOK = "https://discord.com/api/webhooks/1490854953772650567/_p1b0BaWHgkefgow0IYrRBgU_ONaUO_Hunt9yQy7HSJcI7BB1bJUBf_-xKpeqPFn8EhF";
const PAYPAL = "https://www.paypal.com/paypalme/StephanMerdanes";

let item = "";
let price = 0;

function buy(name, cost){
  document.getElementById("modal").style.display="flex";
  document.getElementById("itemName").innerText=name;
  item = name;
  price = cost;
}

function confirmPurchase(){
  const user = document.getElementById("discord").value;

  if(!user){
    alert("Enter Discord username");
    return;
  }

  const time = new Date().toLocaleString();

  fetch(WEBHOOK,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      content:
`🛒 NEW ORDER
👤 User: ${user}
🛍 Service: ${item}
💵 Price: $${price}
⏱ Time: ${time}`
    })
  });

  window.open(PAYPAL,"_blank");
  alert("Order sent! Complete payment.");
}
</script>

</body>
</html>
