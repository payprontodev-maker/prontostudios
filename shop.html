<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronto Shop</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0b0f1a, #02040a);
    color: white;
    overflow-x: hidden;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    align-items: center;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 999;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 40px;
}

.logo span {
    font-weight: bold;
    font-size: 18px;
}

nav a {
    color: #aaa;
    text-decoration: none;
}

nav a:hover {
    color: #8b5cf6;
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 120px;
}

.hero h1 {
    font-size: 50px;
    background: linear-gradient(90deg,#8b5cf6,#22d3ee);
    -webkit-background-clip: text;
    color: transparent;
}

.hero p {
    color: #777;
}

/* SEARCH */
.search-box {
    margin: 25px auto;
    width: 300px;
}

.search-box input {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: #111;
    color: white;
    outline: none;
}

/* USER INPUT */
.user-box {
    text-align: center;
    margin-top: 10px;
}

.user-box input {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* GRID */
.grid {
    padding: 50px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
    gap: 25px;
}

/* CARD */
.card {
    background: linear-gradient(145deg,#0f172a,#020617);
    border-radius: 18px;
    overflow: hidden;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
}

.card:hover {
    transform: translateY(-12px) scale(1.02);
    box-shadow: 0 0 40px rgba(139,92,246,0.5);
}

/* BADGE */
.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #8b5cf6;
    padding: 4px 10px;
    border-radius: 10px;
    font-size: 12px;
}

/* IMAGE */
.card img {
    width: 100%;
}

/* BODY */
.card-body {
    padding: 20px;
}

.card h3 {
    margin-bottom: 10px;
}

.price {
    color: #22d3ee;
    margin-bottom: 15px;
    font-weight: bold;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg,#8b5cf6,#6366f1);
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 20px #8b5cf6;
}

/* PARTICLES */
.particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(139,92,246,0.15);
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh);}
    to { transform: translateY(-10vh);}
}

/* MOBILE */
@media(max-width:600px){
    .grid { padding: 20px; }
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<nav>
    <div class="logo">
        <img src="logo.png">
        <span>Pronto Studios</span>
    </div>
    <a href="index.html">Home</a>
</nav>

<div class="hero">
    <h1>Official Shop</h1>
    <p>Premium services for Streetz War creators</p>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search services..." onkeyup="filter()">
</div>

<div class="user-box">
    <input type="text" id="discord" placeholder="Enter Discord Username">
</div>

<div class="grid" id="products">

<!-- PRODUCTS -->
</div>

<script>
const webhook = "PASTE_WEBHOOK_HERE";

const items = [
["Turf Showcases",4.50],
["Gang Movie Trailer",10],
["Custom Film",7.50],
["Gang Pics",1.50],
["Gang Edits",5],
["Custom Edits",4],
["Advertisement",2]
];

const grid = document.getElementById("products");

function render(list){
    grid.innerHTML = "";
    list.forEach(i=>{
        grid.innerHTML += `
        <div class="card">
            <div class="badge">HOT</div>
            <img src="product.png">
            <div class="card-body">
                <h3>${i[0]}</h3>
                <div class="price">$${i[1]}</div>
                <button onclick="buy('${i[0]}',${i[1]})">Buy</button>
            </div>
        </div>
        `;
    });
}

render(items);

function filter(){
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = items.filter(i=>i[0].toLowerCase().includes(val));
    render(filtered);
}

function buy(item,price){
    let user = document.getElementById("discord").value;
    if(!user){
        alert("Enter Discord username");
        return;
    }

    fetch(webhook,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            content:`🛒 ORDER\nUser: ${user}\nItem: ${item}\nPrice: $${price}\nTime: ${new Date().toLocaleString()}`
        })
    });

    window.open("https://www.paypal.com/paypalme/YOURNAME/"+price,"_blank");
}

/* PARTICLES */
const p = document.getElementById("particles");
for(let i=0;i<30;i++){
    let c=document.createElement("div");
    c.className="circle";
    c.style.width=Math.random()*6+"px";
    c.style.height=c.style.width;
    c.style.left=Math.random()*100+"%";
    c.style.animationDuration=(Math.random()*10+5)+"s";
    p.appendChild(c);
}
</script>

</body>
</html>
