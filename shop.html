<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pronto Shop</title>
<link rel="icon" href="logo.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(120deg,#020617,#0f172a);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{width:40px;}

nav a{
margin-left:20px;
color:#aaa;
text-decoration:none;
}

/* HERO */
.hero{
padding-top:120px;
text-align:center;
}

.hero h1{
font-size:55px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
-webkit-background-clip:text;
color:transparent;
}

/* GRID */
.grid{
padding:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:25px;
overflow:hidden;
backdrop-filter:blur(20px);
transition:0.4s;
position:relative;
}

.card::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,#7a5cff44,transparent);
opacity:0;
transition:0.4s;
}

.card:hover::before{
opacity:1;
}

.card:hover{
transform:translateY(-12px) scale(1.04);
box-shadow:0 0 40px rgba(122,92,255,0.4);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:20px;
}

.price{
color:#00d4ff;
margin:10px 0;
font-size:18px;
}

/* BUTTON */
.buy-btn{
width:100%;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
transition:0.3s;
}

.buy-btn:hover{
transform:scale(1.07);
box-shadow:0 0 25px #7a5cff;
}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(12px);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:linear-gradient(145deg,#0d1025,#05070f);
padding:40px;
border-radius:25px;
width:340px;
text-align:center;
box-shadow:0 0 60px rgba(122,92,255,0.5);
animation:pop 0.4s ease;
}

.popup-box input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
}

.popup-box button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
}

@keyframes pop{
from{transform:scale(0.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
<h3>Pronto Studios</h3>
</div>

<nav>
<a href="index.html">Home</a>
</nav>
</header>

<div class="hero">
<h1>Shop</h1>
<p style="color:#aaa;margin-top:10px;">Premium services — instant delivery setup</p>
</div>

<div class="grid">

<!-- PRODUCTS -->
<script>
const products = [
["Turf Showcases",4.5],
["Gang Movie Trailer",10],
["Custom Film",7.5],
["Gang Pics",1.5],
["Gang Edits",5],
["Custom Edits",4],
["Advertisement",2]
];

document.write(products.map(p=>`
<div class="card">
<img src="product.png">
<div class="card-body">
<h3>${p[0]}</h3>
<div class="price">$${p[1]}</div>
<button class="buy-btn" onclick="openPopup('${p[0]}',${p[1]})">Purchase</button>
</div>
</div>
`).join(""));
</script>

</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2>Secure Checkout</h2>
<p style="font-size:13px;color:#aaa;">Enter your Discord so we can contact you</p>

<input id="discord" placeholder="username#0000">

<button onclick="buy()">Continue to PayPal</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>
let item="";
let price=0;

function openPopup(i,p){
item=i;
price=p;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function buy(){
let user=document.getElementById("discord").value;

if(!user){
alert("Enter Discord username");
return;
}

/* DISCORD WEBHOOK */
fetch("https://discord.com/api/webhooks/1490854953772650567/_p1b0BaWHgkefgow0IYrRBgU_ONaUO_Hunt9yQy7HSJcI7BB1bJUBf_-xKpeqPFn8EhF",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`🛒 ORDER\nUser: ${user}\nItem: ${item}\nPrice: $${price}`
})
});

/* PAYPAL */
window.open("https://www.paypal.com/paypalme/StephanMerdanes/"+price,"_blank");

closePopup();
}
</script>

</body>
</html>
