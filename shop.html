<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronto Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body {
  background: radial-gradient(circle at top, #0a1228, #020611);
  color: white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background: rgba(0,0,0,0.4);
}

.logo {display:flex;align-items:center;gap:10px;}
.logo img {width:35px;}

nav a {
  margin-left:15px;
  color:#aaa;
  text-decoration:none;
}

/* GRID */
.shop {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  padding:25px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 20px rgba(100,140,255,0.3);
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.price {
  color:#6c8cff;
  margin:10px 0;
}

/* BUTTON */
button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  background: linear-gradient(90deg,#6c8cff,#7c3aed);
  color:white;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:#111827;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

.modal input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <span>Pronto Studios</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </nav>
</header>

<section class="shop">

<!-- ITEMS -->
<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Turf Showcases</h3>
<div class="price">$4.50</div>
<button onclick="openModal('Turf Showcases', 4.5)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Gang Movie Trailer</h3>
<div class="price">$10</div>
<button onclick="openModal('Gang Movie Trailer', 10)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Custom Film</h3>
<div class="price">$7.50</div>
<button onclick="openModal('Custom Film', 7.5)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Gang Pics</h3>
<div class="price">$1.50</div>
<button onclick="openModal('Gang Pics', 1.5)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Gang Edits</h3>
<div class="price">$5</div>
<button onclick="openModal('Gang Edits', 5)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Custom Edits</h3>
<div class="price">$4</div>
<button onclick="openModal('Custom Edits', 4)">Buy</button>
</div>
</div>

<div class="card">
<img src="product.png">
<div class="card-content">
<h3>Advertisement</h3>
<div class="price">$2</div>
<button onclick="openModal('Advertisement', 2)">Buy</button>
</div>
</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="serviceName"></h3>
    <input type="text" id="username" placeholder="Discord Username">
    <br><br>
    <button onclick="purchase()">Confirm Purchase</button>
  </div>
</div>

<script>

const WEBHOOK_URL = "PASTE YOUR WEBHOOK HERE";
const PAYPAL_LINK = "https://www.paypal.com/paypalme/YOURNAME";

let currentService = "";
let currentPrice = 0;

function openModal(service, price){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("serviceName").innerText = service;
  currentService = service;
  currentPrice = price;
}

function generateOrderID(){
  return "ORD" + Math.floor(Math.random()*1000000);
}

function purchase(){
  const user = document.getElementById("username").value;

  if(!user){
    alert("Enter Discord username");
    return;
  }

  const orderID = generateOrderID();
  const time = new Date().toLocaleString();

  // SAVE TO ADMIN DASHBOARD
  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  const newOrder = {
    id: orderID,
    user: user,
    service: currentService,
    price: currentPrice,
    time: time
  };

  orders.push(newOrder);
  localStorage.setItem("orders", JSON.stringify(orders));

  // SEND TO DISCORD
  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      content:
`🛒 NEW ORDER
Order ID: ${orderID}
User: ${user}
Purchased: ${currentService}
Price: $${currentPrice}
Time: ${time}`
    })
  });

  // PAYPAL
  window.open(PAYPAL_LINK, "_blank");

  alert("Order placed! Complete payment on PayPal.");
}
</script>

</body>
</html>
