<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronto Studios</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body {
  background: radial-gradient(circle at top, #0a1228, #020611);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img {
  width:40px;
}

nav a {
  margin-left:25px;
  color:#aaa;
  text-decoration:none;
  font-size:14px;
  transition:0.3s;
}

nav a:hover {
  color:#6c8cff;
}

/* HERO */
.hero {
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation: fadeIn 1.2s ease;
}

.hero h1 {
  font-size:55px;
  background: linear-gradient(90deg,#6c8cff,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p {
  margin-top:15px;
  color:#aaa;
}

.btn {
  margin-top:30px;
  padding:14px 30px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  font-size:16px;
  background: linear-gradient(90deg,#6c8cff,#7c3aed);
  color:white;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(108,140,255,0.4);
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <span>Pronto Studios</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </nav>
</header>

<section class="hero">
  <h1>Pronto Studios</h1>
  <p>Premium edits, showcases, and content creation</p>

  <button class="btn" onclick="goShop()">Go to Shop</button>
</section>

<script>
function goShop(){
  window.location.href = "shop.html"; 
}
</script>

</body>
</html>
