<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronto Studios | Street Wars 2 Visuals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        .hero-bg {
            background-image: url('./hero-bg.gif');   /* ← Your GIF file */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);   /* Dark overlay so text is readable */
            z-index: 1;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
        }

        /* Insane Animations */
        .glow-text {
            animation: insaneGlow 3.5s ease-in-out infinite alternate;
        }

        @keyframes insaneGlow {
            from { text-shadow: 0 0 20px #00b4ff; }
            to { text-shadow: 0 0 80px #00b4ff, 0 0 120px #00b4ff; }
        }
    </style>
</head>
<body class="bg-black text-white font-['Inter'] overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="bg-black/90 backdrop-blur-2xl border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-6 flex items-center justify-between">
            <img src="logo.png" alt="Pronto Studios" class="h-12 w-auto">

            <div class="hidden md:flex items-center gap-12 text-lg font-medium">
                <a href="index.html" class="text-[#00b4ff]">Home</a>
                <a href="shop.html" class="hover:text-[#00b4ff]">Shop</a>
                <a href="terms.html" class="hover:text-[#00b4ff]">Terms</a>
            </div>

            <a href="shop.html" class="px-10 py-3.5 bg-[#00b4ff] text-black font-semibold rounded-3xl">
                Shop Services
            </a>
        </div>
    </nav>

    <!-- HERO with GIF Background -->
    <header class="hero-bg flex items-center">
        <div class="hero-content max-w-screen-2xl mx-auto px-8">
            <div class="max-w-2xl">
                <div class="inline-flex items-center gap-3 px-6 py-3 bg-white/10 border border-white/20 rounded-full text-sm font-medium mb-8">
                    PREMIUM STREET WARS 2 VISUALS
                </div>

                <h1 class="text-5xl md:text-6xl font-bold tracking-tighter leading-tight mb-8 glow-text" style="font-family: 'Space Grotesk', sans-serif;">
                    Turning Street Wars 2 clips<br>into cinematic masterpieces
                </h1>

                <p class="text-xl text-gray-200 mb-12 max-w-lg">
                    Professional GFX, montages, and high-quality editing that makes your gameplay stand out.
                </p>

                <a href="shop.html" 
                   class="inline-block px-12 py-6 bg-white text-black font-semibold text-xl rounded-3xl hover:bg-gray-100">
                    Browse Services
                </a>
            </div>
        </div>
    </header>

</body>
</html>
