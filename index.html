<!-- 🔥 ULTRA HEADER START -->
<style>
#navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
z-index:1000;
transition:0.3s;
}

.nav-container{
margin-top:15px;
width:90%;
max-width:1200px;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 30px rgba(122,92,255,0.2);
transition:0.3s;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
}

.logo img{
width:40px;
animation:logoGlow 3s infinite alternate;
}

@keyframes logoGlow{
from{filter:drop-shadow(0 0 5px #7a5cff);}
to{filter:drop-shadow(0 0 20px #00d4ff);}
}

nav{
display:flex;
align-items:center;
gap:20px;
}

nav a{
position:relative;
color:#aaa;
text-decoration:none;
transition:0.3s;
}

nav a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

nav a:hover{
color:white;
}

/* DROPDOWN */
.dropdown{
position:relative;
}

.dropdown-menu{
position:absolute;
top:30px;
left:0;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(15px);
padding:10px;
border-radius:10px;
display:none;
flex-direction:column;
}

.dropdown-menu a{
padding:8px 15px;
white-space:nowrap;
}

.dropdown:hover .dropdown-menu{
display:flex;
}

/* PROFILE */
.profile{
position:relative;
cursor:pointer;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
box-shadow:0 0 15px #7a5cff;
}

.profile-menu{
position:absolute;
top:45px;
right:0;
background:rgba(0,0,0,0.9);
padding:15px;
border-radius:10px;
display:none;
width:150px;
text-align:center;
}

.profile:hover .profile-menu{
display:block;
}

.profile-menu button{
margin-top:10px;
padding:8px;
border:none;
border-radius:8px;
background:#7a5cff;
color:white;
cursor:pointer;
}

/* SCROLL EFFECT */
.scrolled .nav-container{
padding:10px 25px;
box-shadow:0 0 50px rgba(122,92,255,0.5);
transform:scale(0.98);
}
</style>

<header id="navbar">
  <div class="nav-container">

    <div class="logo">
      <img src="logo.png">
      <span>Pronto Studios</span>
    </div>

    <nav>

      <div class="dropdown">
        <a href="#">Services ▾</a>
        <div class="dropdown-menu">
          <a href="shop.html">Turf Showcases</a>
          <a href="shop.html">Gang Trailers</a>
          <a href="shop.html">Custom Edits</a>
        </div>
      </div>

      <a href="shop.html">Shop</a>

      <div class="profile">
        <div class="avatar"></div>
        <div class="profile-menu">
          <p>Guest</p>
          <button onclick="alert('Login system coming soon')">Login</button>
        </div>
      </div>

    </nav>

  </div>
</header>

<script>
window.addEventListener("scroll",()=>{
const nav=document.getElementById("navbar");
if(window.scrollY > 20){
nav.classList.add("scrolled");
}else{
nav.classList.remove("scrolled");
}
});
</script>
<!-- 🔥 ULTRA HEADER END -->
