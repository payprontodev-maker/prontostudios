<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronto Studios | Cinematic Street Wars 2 Visuals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        .hero-bg {
            background-image: url('./hero-bg.jpg'); /* ← Your single background image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            min-height: 100vh;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.85));
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        /* Entrance Animation */
        .animate-in {
            opacity: 0;
            transform: translateY(50px);
            animation: fadeUp 1.1s forwards;
        }
        .animate-in-delay1 { animation-delay: 0.2s; }
        .animate-in-delay2 { animation-delay: 0.5s; }
        .animate-in-delay3 { animation-delay: 0.8s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Neon hover effect */
        .neon-btn {
            transition: all 0.3s ease;
        }
        .neon-btn:hover {
            box-shadow: 0 0 25px #00b4ff;
            transform: translateY(-3px);
        }
    </style>
</head>
<body class="bg-black text-white font-['Inter'] overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="bg-black/95 backdrop-blur-2xl border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 md:px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Pronto Studios" class="h-11 w-auto">
                <span class="font-semibold tracking-widest text-xl hidden sm:block">PRONTO</span>
            </div>
           
            <div class="hidden md:flex items-center gap-10 text-lg font-medium">
                <a href="index.html" class="text-[#00b4ff] hover:text-white transition">Home</a>
                <a href="shop.html" class="hover:text-[#00b4ff] transition">Shop</a>
                <a href="profile.html" class="hover:text-[#00b4ff] transition">Profile</a>
                <a href="terms.html" class="hover:text-[#00b4ff] transition">Terms</a>
            </div>

            <a href="shop.html" 
               class="px-9 py-3.5 bg-[#00b4ff] hover:bg-white text-black font-semibold rounded-3xl transition-all neon-btn">
                Shop Services
            </a>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero-bg flex items-center">
        <div class="hero-content max-w-screen-2xl mx-auto px-6 md:px-8">
            <div class="max-w-2xl">
                <!-- Badge -->
                <div class="animate-in animate-in-delay1 inline-flex items-center gap-2 px-6 py-2.5 bg-white/10 border border-white/20 rounded-full text-sm font-medium tracking-wider mb-8">
                    <span class="w-2 h-2 bg-[#00b4ff] rounded-full animate-pulse"></span>
                    EST. 2025 • STREET WARS 2 SPECIALIST
                </div>

                <!-- Headline -->
                <h1 class="animate-in animate-in-delay2 text-6xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-none mb-8" 
                    style="font-family: 'Space Grotesk', sans-serif;">
                    We don't just edit.<br>
                    We <span class="text-[#00b4ff]">create legends</span>.
                </h1>

                <!-- Subtitle -->
                <p class="animate-in animate-in-delay3 text-2xl md:text-3xl text-gray-200 max-w-md mb-14">
                    Premium cinematic GFX, montages, and video editing for <span class="font-semibold text-white">Street Wars 2</span>.
                </p>

                <!-- Buttons -->
                <div class="animate-in animate-in-delay3 flex flex-col sm:flex-row gap-5">
                    <a href="shop.html" 
                       class="px-14 py-7 bg-white text-black font-semibold text-2xl rounded-3xl hover:bg-gray-100 transition-all neon-btn flex items-center justify-center">
                        Browse Services
                    </a>
                    <a href="#" onclick="watchReel()" 
                       class="px-14 py-7 border-2 border-white/60 hover:border-white text-2xl font-medium rounded-3xl flex items-center justify-center gap-4 transition-all neon-btn">
                        <i class="fas fa-play text-[#00b4ff]"></i> 
                        Watch Reel
                    </a>
                </div>

                <p class="mt-12 text-sm text-gray-400 flex items-center gap-2">
                    <i class="fas fa-check-circle text-emerald-400"></i>
                    Trusted by top Street Wars 2 creators
                </p>
            </div>
        </div>
    </header>

    <script>
        function watchReel() {
            alert("🎥 Reel coming soon!\n\nDM us on Discord to see our latest Street Wars 2 work.");
        }
    </script>
</body>
</html>
