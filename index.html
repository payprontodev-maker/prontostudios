<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pronto Studios</title>
<link rel="icon" href="logo.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
scroll-behavior:smooth;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* SPARKLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* GLOW */
.bg-glow{
position:fixed;
width:700px;
height:700px;
background:#7a5cff;
filter:blur(160px);
opacity:0.2;
top:-200px;
left:-200px;
animation:moveGlow 12s infinite alternate;
z-index:-1;
}

@keyframes moveGlow{
100%{transform:translate(250px,250px);}
}

/* HEADER */
#navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
z-index:1000;
}

.nav-container{
margin-top:15px;
width:90%;
max-width:1200px;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 0 30px rgba(122,92,255,0.2);
transition:0.3s;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
animation:logoGlow 3s infinite alternate;
}

@keyframes logoGlow{
from{filter:drop-shadow(0 0 5px #7a5cff);}
to{filter:drop-shadow(0 0 20px #00d4ff);}
}

nav{
display:flex;
align-items:center;
gap:20px;
}

nav a{
color:#aaa;
text-decoration:none;
position:relative;
}

nav a::after{
content:"";
position:absolute;
width:0%;
height:2px;
background:#7a5cff;
bottom:-5px;
left:0;
transition:0.3s;
}

nav a:hover::after{width:100%;}
nav a:hover{color:white;}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:70px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
-webkit-background-clip:text;
color:transparent;
animation:fadeUp 1s ease;
}

.hero p{
margin-top:20px;
color:#aaa;
max-width:600px;
}

.btn{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px #7a5cff;
}

/* SECTION */
.section{
padding:100px 60px;
text-align:center;
opacity:0;
transform:translateY(40px);
transition:1s;
}

.section.show{
opacity:1;
transform:translateY(0);
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.feature{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
transition:0.3s;
}

.feature:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #7a5cff;
}

/* POPUP */
#popupOverlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#popupBox{
background:#0f172a;
padding:40px;
border-radius:20px;
max-width:500px;
text-align:center;
}

#popupBox button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#7a5cff;
color:white;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
color:#666;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;}
}
</style>
</head>

<body>

<canvas id="sparkles"></canvas>
<div class="bg-glow"></div>

<header id="navbar">
<div class="nav-container">
<div class="logo">
<img src="logo.png">
<h3>Pronto Studios</h3>
</div>
<nav>
<a href="shop.html">Shop</a>
</nav>
</div>
</header>

<div class="hero">
<h1>Pronto Studios</h1>
<p>Premium cinematic edits & content</p>
<button class="btn" onclick="location.href='shop.html'">Go To Shop</button>
</div>

<div class="section">
<h2>Why Choose Us</h2>
<div class="features">
<div class="feature">Elite Quality</div>
<div class="feature">Fast Delivery</div>
<div class="feature">Custom Work</div>
</div>
</div>

<footer>© 2026 Pronto Studios</footer>

<!-- POPUP -->
<div id="popupOverlay">
<div id="popupBox">
<h2>Welcome</h2>
<p>Enter your real Discord username when purchasing.</p>
<button onclick="closePopup()">I Understand</button>
</div>
</div>

<script>
function closePopup(){
document.getElementById("popupOverlay").style.display="none";
}

/* SCROLL ANIM */
const sections=document.querySelectorAll(".section");
window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
if(sec.getBoundingClientRect().top < window.innerHeight-100){
sec.classList.add("show");
}
});
});

/* SPARKLES */
const canvas=document.getElementById("sparkles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<80;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
s:Math.random()*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

s.y-=s.s;
if(s.y<0){
s.y=canvas.height;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
