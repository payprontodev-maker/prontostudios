<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronto Studios</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1c;
  color: white;
}

/* HEADER FIXED */
header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 60px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  flex-wrap: nowrap;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 42px;
  height: 42px;
  object-fit: cover;
  border-radius: 10px;
}

nav {
  display: flex;
  align-items: center;
}

nav a {
  color: #aaa;
  margin-left: 25px;
  text-decoration: none;
  white-space: nowrap;
}

nav a:hover {
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  padding: 140px 20px;
}

.hero h1 {
  font-size: 56px;
}

.hero p {
  color: #aaa;
}

.buttons a {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  border-radius: 999px;
  background: linear-gradient(135deg,#3a7bff,#2563eb);
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <strong>Pronto</strong>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Purchase</a>
    <a href="learn.html">Learn More</a>
    <a href="about.html">About</a>
  </nav>
</header>

<div class="hero">
  <h1>Pronto Studios</h1>
  <p>Premium video edits, showcases, and media services</p>

  <div class="buttons">
    <a href="shop.html">Get Started</a>
    <a href="learn.html">Learn More</a>
  </div>
</div>

</body>
</html>
