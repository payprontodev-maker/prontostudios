<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronto Store</title>

<style>
/* ===== GLOBAL ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0a0f2c, #02040f);
    color: white;
    overflow-x: hidden;
}

/* ===== NAVBAR ===== */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    backdrop-filter: blur(15px);
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 45px;
    border-radius: 10px;
}

.logo h1 {
    font-size: 22px;
    font-weight: 600;
}

/* ===== HERO ===== */
.hero {
    height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    position: relative;
}

/* glow background */
.hero::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #6c5cff, transparent 70%);
    filter: blur(120px);
    z-index: 0;
}

.hero-content {
    position: relative;
    z-index: 2;
    animation: fadeUp 1.2s ease;
}

.hero img {
    width: 200px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 25px rgba(108,92,255,0.6));
}

.hero h2 {
    font-size: 60px;
    font-weight: 800;
    background: linear-gradient(90deg, #ffffff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    margin-top: 15px;
    font-size: 18px;
    color: #bbb;
}

/* ===== BUTTON ===== */
.btn {
    margin-top: 30px;
    padding: 15px 35px;
    border-radius: 999px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(90deg, #6c5cff, #8f6aff);
    color: white;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(108,92,255,0.4);
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px rgba(108,92,255,0.7);
}

/* ===== FEATURES ===== */
.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 80px 60px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 30px rgba(108,92,255,0.2);
}

.card h3 {
    margin-bottom: 10px;
}

.card p {
    color: #aaa;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    padding: 40px;
    color: #777;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        <img src="logo.png">
        <h1>Pronto</h1>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <img src="logo.png">
        <h2>PRONTO STORE</h2>
        <p>Premium edits, showcases & exclusive content</p>
        <button class="btn" onclick="location.href='shop.html'">Go To Shop</button>
    </div>
</section>

<!-- FEATURES -->
<section class="features">
    <div class="card">
        <h3>⚡ Fast Delivery</h3>
        <p>Get your edits quickly with high quality guaranteed.</p>
    </div>
    <div class="card">
        <h3>🔥 Premium Quality</h3>
        <p>Top-tier visuals made for serious creators.</p>
    </div>
    <div class="card">
        <h3>🎬 Custom Content</h3>
        <p>Tailored edits and showcases to match your style.</p>
    </div>
</section>

<!-- FOOTER -->
<div class="footer">
    © 2026 Pronto Studios
</div>

</body>
</html>
