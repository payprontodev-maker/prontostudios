<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronto Studios</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #0a0f1c;
  color: white;
}

/* NAV */
<header>
  <div class="logo">
    <img src="logo.png">
    <strong>Pronto</strong>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Purchase</a>
    <a href="learn.html">Learn More</a>
    <a href="about.html">About</a>
  </nav>
</header>
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 40px;
  border-radius: 10px;
}

nav a {
  color: #aaa;
  margin-left: 25px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: white;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 1s ease forwards;
}

.fade:nth-child(2){ animation-delay: .3s }
.fade:nth-child(3){ animation-delay: .6s }

@keyframes fadeUp {
  to { opacity:1; transform:translateY(0); }
}

.hero h1 {
  font-size: 52px;
}

.hero p {
  color: #888;
  margin: 15px 0;
}

/* BUTTONS */
.btn {
  padding: 14px 28px;
  border-radius: 999px;
  background: linear-gradient(135deg,#3a7bff,#2563eb);
  text-decoration: none;
  color: white;
  margin: 10px;
  display: inline-block;
  transition: .3s;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 25px rgba(58,123,255,0.5);
}

/* GLOW */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: #3a7bff;
  filter: blur(120px);
  opacity: 0.2;
  top: 20%;
  left: 30%;
}
</style>
</head>

<body>

<div class="glow"></div>

<header>
  <div class="logo">
    <img src="logo.png">
    <strong>Pronto</strong>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Purchase</a>
    <a href="learn.html">Learn More</a>
  </nav>
</header>

<div class="hero">
  <div>
    <h1 class="fade">Pronto Studios</h1>
    <p class="fade">Premium video edits, showcases, and media services</p>
    <a href="shop.html" class="btn fade">Get Started</a>
    <a href="learn.html" class="btn fade">Learn More</a>
  </div>
</div>

</body>
</html>
