<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronto Studios</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background: radial-gradient(circle at top,#0a1228,#020611);
  color:white;
}

/* NAV */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{width:40px;border-radius:8px;}

nav a{
  margin-left:15px;
  color:#aaa;
  text-decoration:none;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img{
  width:150px;
  margin-bottom:20px;
}

.hero h1{
  font-size:50px;
}

.hero p{
  color:#aaa;
  margin-top:10px;
}

button{
  margin-top:25px;
  padding:15px 35px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#6c8cff,#7c3aed);
  color:white;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <span>Pronto Studios</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </nav>
</header>

<div class="hero">
  <div>
    <img src="logo.png">
    <h1>PRONTO STUDIOS</h1>
    <p>Premium edits, showcases & content services</p>
    <button onclick="location.href='shop.html'">Go to Shop</button>
  </div>
</div>

</body>
</html>
