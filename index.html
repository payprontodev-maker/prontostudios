<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pronto Studios</title>
<link rel="icon" href="logo.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:#030712;
color:white;
overflow-x:hidden;
}

/* GRID BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:60px 60px;
z-index:-3;
}

/* GLOW ORBS */
.glow{
position:fixed;
width:700px;
height:700px;
background:#7a5cff;
filter:blur(180px);
opacity:0.25;
top:-200px;
left:-200px;
animation:moveGlow 15s infinite alternate;
z-index:-2;
}

.glow2{
background:#00d4ff;
top:50%;
left:60%;
animation-delay:2s;
}

@keyframes moveGlow{
100%{transform:translate(300px,300px);}
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{width:42px;}

.nav-links a{
margin-left:25px;
color:#aaa;
text-decoration:none;
transition:0.3s;
}

.nav-links a:hover{
color:white;
text-shadow:0 0 10px #7a5cff;
}

/* HERO */
.hero{
text-align:center;
padding-top:120px;
max-width:850px;
margin:auto;
animation:fadeUp 1s ease;
}

.badge{
display:inline-block;
padding:8px 18px;
border-radius:20px;
background:rgba(122,92,255,0.2);
margin-bottom:20px;
animation:fadeUp 1.2s ease;
}

.hero h1{
font-size:64px;
margin-bottom:20px;
line-height:1.1;
}

.gradient{
background:linear-gradient(90deg,#7a5cff,#00d4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
color:#aaa;
margin-bottom:30px;
animation:fadeUp 1.4s ease;
}

/* BUTTONS */
.btn{
padding:16px 32px;
border-radius:40px;
border:none;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
margin:10px;
font-size:16px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 30px #7a5cff;
}

/* POPUP */
#popup{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
padding:40px;
border-radius:20px;
text-align:center;
width:320px;
box-shadow:0 0 40px rgba(122,92,255,0.5);
animation:popIn 0.4s ease;
}

.popup-box input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#020617;
color:white;
}

.popup-box button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;}
}

@keyframes popIn{
from{opacity:0;transform:scale(0.8);}
to{opacity:1;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="glow"></div>
<div class="glow glow2"></div>

<nav>
<div class="logo">
<img src="logo.png">
<h3>PRONTO STUDIO</h3>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="shop.html">Store</a>
</div>
</nav>

<div class="hero">
<div class="badge">Premium Roblox Visuals</div>

<h1>
Turning clips into<br>
<span class="gradient">masterpieces</span>
</h1>

<p>
Professional edits, montages, and visuals built to dominate.
</p>

<button class="btn" onclick="location.href='shop.html'">View Store</button>
</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2>Enter Discord</h2>
<input id="discordUser" placeholder="username#0000">
<button onclick="saveUser()">Continue</button>
</div>
</div>

<script>
function saveUser(){
let user=document.getElementById("discordUser").value;
if(!user){alert("Enter username");return;}
localStorage.setItem("discord",user);
document.getElementById("popup").style.display="none";
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
s:Math.random()*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

s.y-=s.s;
if(s.y<0){
s.y=canvas.height;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
