<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronto Studios | Cinematic Street Wars 2 Visuals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        .hero-bg {
            background-image: url('./hero-bg.jpg');     /* Change filename if different */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }
        
        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.68);   /* Dark overlay - adjust if needed */
            z-index: 1;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
        }

        /* Opening Animation */
        .animate-in {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUp 1s forwards;
        }

        .animate-in-delay1 { animation-delay: 0.2s; }
        .animate-in-delay2 { animation-delay: 0.5s; }
        .animate-in-delay3 { animation-delay: 0.8s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-black text-white font-['Inter'] overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="bg-black/90 backdrop-blur-2xl border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-6 flex items-center justify-between">
            <img src="logo.png" alt="Pronto Studios" class="h-12 w-auto">
            
            <div class="hidden md:flex items-center gap-12 text-lg font-medium">
                <a href="index.html" class="text-[#00b4ff]">Home</a>
                <a href="shop.html" class="hover:text-[#00b4ff]">Shop</a>
                <a href="profile.html" class="hover:text-[#00b4ff]">Profile</a>
                <a href="terms.html" class="hover:text-[#00b4ff]">Terms</a>
            </div>

            <a href="shop.html" class="px-10 py-3.5 bg-[#00b4ff] text-black font-semibold rounded-3xl">
                Shop Services
            </a>
        </div>
    </nav>

    <!-- HERO with Background Image + Animation -->
    <header class="hero-bg min-h-screen flex items-center">
        <div class="hero-content max-w-screen-2xl mx-auto px-8">
            <div class="max-w-3xl">
                <!-- Badge -->
                <div class="animate-in animate-in-delay1 inline-block px-6 py-2.5 bg-white/10 border border-white/20 rounded-full text-sm font-medium mb-8">
                    EST. 2025 • STREET WARS 2 SPECIALIST
                </div>

                <!-- Headline -->
                <h1 class="animate-in animate-in-delay2 text-6xl md:text-7xl font-bold tracking-tighter leading-none mb-8" style="font-family: 'Space Grotesk', sans-serif;">
                    We don't just edit.<br>
                    We <span class="text-[#00b4ff]">create legends</span>.
                </h1>

                <!-- Subtitle -->
                <p class="animate-in animate-in-delay3 text-2xl text-gray-200 max-w-lg mb-12">
                    Premium cinematic GFX, montages, and video editing for Street Wars 2.
                </p>

                <!-- Buttons -->
                <div class="animate-in animate-in-delay3 flex flex-col sm:flex-row gap-6">
                    <a href="shop.html" class="px-12 py-6 bg-white text-black font-semibold text-xl rounded-3xl hover:bg-gray-100">
                        Browse Services
                    </a>
                    <a href="#" onclick="watchReel()" class="px-12 py-6 border border-white/50 hover:border-white text-xl font-medium rounded-3xl flex items-center gap-3">
                        <i class="fas fa-play"></i> Watch Reel
                    </a>
                </div>
            </div>
        </div>
    </header>

    <script>
        function watchReel() {
            alert("🎥 Reel coming soon!\n\nDM us on Discord to see our latest work.");
        }
    </script>
</body>
</html>
