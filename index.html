<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pronto Studios</title>
<link rel="icon" href="logo.png">

<style>
*{
margin:0;padding:0;box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:#020617;
color:white;
overflow:hidden;
}

/* FADE TRANSITION */
body.fade-out{
opacity:0;
transition:0.5s;
}

/* NAV */
header{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(15px);
z-index:1000;
}

.logo{
display:flex;
gap:10px;
align-items:center;
}

.logo img{width:40px;}

nav a{
margin-left:20px;
color:#aaa;
text-decoration:none;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
animation:fadeIn 1.5s ease;
}

.hero h1{
font-size:70px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
margin-top:15px;
color:#888;
}

/* BUTTON */
.btn{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
transition:0.3s;
position:relative;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px #7a5cff;
}

/* MAGNET EFFECT */
.btn span{
position:relative;
z-index:2;
}

/* CURSOR */
.cursor{
position:fixed;
width:12px;
height:12px;
background:#7a5cff;
border-radius:50%;
pointer-events:none;
z-index:9999;
box-shadow:0 0 25px #7a5cff;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* POPUP */
#popupOverlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#popupBox{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
max-width:500px;
text-align:center;
animation:pop 0.5s ease;
}

#popupBox button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#7a5cff,#00d4ff);
color:white;
cursor:pointer;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes pop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<header>
<div class="logo">
<img src="logo.png">
<h3>Pronto Studios</h3>
</div>

<nav>
<a href="#" onclick="goShop()">Shop</a>
</nav>
</header>

<div class="hero">
<h1>Pronto Studios</h1>
<p>Premium cinematic content & edits</p>

<button class="btn" onclick="goShop()">
<span>Go To Shop</span>
</button>
</div>

<div id="popupOverlay">
<div id="popupBox">
<h2>Welcome</h2>
<p>
Enter your real Discord username when purchasing.<br><br>
We use it to contact you for your order.<br><br>
Invalid usernames = no order completion.
</p>
<button onclick="closePopup()">I Understand</button>
</div>
</div>

<script>

/* NAV TRANSITION */
function goShop(){
document.body.classList.add("fade-out");
setTimeout(()=>{
window.location.href="shop.html";
},400);
}

/* POPUP */
function closePopup(){
document.getElementById("popupOverlay").style.display="none";
}

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* PARTICLE CANVAS */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#7a5cff";
ctx.fill();

p.y-=0.2;
if(p.y<0)p.y=canvas.height;
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
